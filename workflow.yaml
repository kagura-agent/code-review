# code-review workflow
# FlowForge enforced — no step can be skipped

name: code-review
description: Multi-model PR review with post-review reflection and PR tracking
version: "1.0"
start: parse_request

nodes:
  parse_request:
    task: |
      Parse the review request. Extract owner, repo, pr_number, and mode.
      User may provide a GitHub link, short format, or natural language.
      Default mode is "report". If user asks to post to PR → "comment" mode.
      Cross-channel callers always get report mode.
    next: load_prompt

  load_prompt:
    task: |
      Load review standard from `~/.openclaw/workspace/code-review/prompts/`:
      1. Check `prompts/<repo>.prompt.md` (project-specific)
      2. Fallback to `prompts/default.prompt.md`
      Read the file content — this is what reviewers will use.
    next: spawn_reviewers

  spawn_reviewers:
    task: |
      Spawn 3 independent reviewer subagents in parallel (sessions_spawn, mode: "run", runTimeoutSeconds: 0):
      - 🌟 Stella: model `default-llm-sg/gpt-5.5`
      - 🌠 Nova: model `default-llm-sg/claude-opus-4.7`
      - 💫 Vega: model `default-llm-sg/gemini-3.1-pro-preview`
      Each gets the review standard + PR details. Do NOT pre-feed the diff.
      Let each reviewer pull via `gh pr view` and `gh pr diff` themselves.
      Each reviewer must `export https_proxy=http://127.0.0.1:1083` first.
      Reviewers must NOT post to GitHub — text output only.
      Reviewers must write their review to `~/.openclaw/workspace/code-review/reviews/<repo>-<pr>-<name>.md`.
      Then output the file path as their final message.
      This prevents truncation AND creates persistent records in the repo.
      Parent reads reviews from files, not session history.
      They must NOT use sessions_yield, sessions_send, or any messaging tool to deliver the review.
      Use sessions_yield to wait for all 3 to complete.

      **For re-reviews (Round 2+):**
      Include the previous round's consolidated review in each reviewer's prompt.
      Add these re-review rules:
      1. Check each previous issue one by one — was it addressed?
      2. ESCALATION RULE: If an issue from the previous round was NOT addressed by the author,
         escalate its severity (Suggestion → Critical). Never downgrade unaddressed issues.
      3. ANTI-CONFIRMATION BIAS: "Your previous acceptance doesn't mean it was correct.
         Re-evaluate with fresh eyes. Finding new issues in code you previously approved is expected."
      4. Also do a fresh review of any new code.
    next: post_summary

  post_summary:
    task: |
      Consolidate the 3 reviews into a structured summary:
      - Consensus findings (2+ reviewers agree) — high confidence
      - Per-reviewer unique findings
      - Per-reviewer rating and key points
      - Overall verdict
      Post to channel AND to the PR via `gh pr review --comment`.
      Always post to PR regardless of mode — Luna wants review comments on the PR.
    next: reflection

  reflection:
    task: |
      Post-review self-improvement. DO NOT SKIP.

      Layer 1 — Record: Write to `runs/<repo>-<pr_number>.md`

      Layer 2 — Prompt Evolution (cross-run pattern check):
        1. Read the last 5 runs in `runs/`
        2. For each Suggestion that appeared in 2+ different PRs: escalate to prompt.
           - Security/auth suggestion repeated → make it Critical in prompt
           - Any category repeated 3+ times → add explicit rule to prompt
        3. For each Critical that reviewers disagreed on severity: clarify calibration in prompt.
        4. If a reviewer found something the prompt didn't cover at all: add the dimension.
        5. Write what you changed and why in the run record.

      Layer 3 — Reviewer Assessment: Update `stats.md` per-reviewer accuracy.
        - Track: unique finds, false positives, missed issues (found by others but not this reviewer)
        - Flag if a reviewer is consistently weaker on a dimension

      Layer 4 — Process Evolution: Did the workflow work well? Update if needed.

      Commit and push any changes with `evolve: <what changed and why>`
      Push is mandatory — local-only commits are invisible to reviewers.
    next: register_tracking

  register_tracking:
    task: |
      Add entry to `tracking.json`:
      { "owner": "...", "repo": "...", "pr": N, "reviewed_at": "ISO date", "status": "open", "ground_truth": null }
      The tracking cron checks these PRs for human review feedback later.
    terminal: true
