# code-review workflow
# FlowForge enforced — no step can be skipped

name: code-review
description: Multi-model PR review with post-review reflection and PR tracking
version: "1.0"
start: parse_request

nodes:
  parse_request:
    task: |
      Parse the review request. Extract owner, repo, pr_number, and mode.
      User may provide a GitHub link, short format, or natural language.
      Default mode is "report". If user asks to post to PR → "comment" mode.
      Cross-channel callers always get report mode.
    next: load_prompt

  load_prompt:
    task: |
      Load review standard from `~/.openclaw/workspace/code-review/prompts/`:
      1. Check `prompts/<repo>.prompt.md` (project-specific)
      2. Fallback to `prompts/default.prompt.md`
      Read the file content — this is what reviewers will use.
    next: spawn_reviewers

  spawn_reviewers:
    task: |
      Spawn 3 independent reviewer subagents in parallel (sessions_spawn, mode: "run", runTimeoutSeconds: 0):
      - 🌟 Stella: model `default-llm-sg/gpt-5.5`
      - 🌠 Nova: model `default-llm-sg/claude-opus-4.7`
      - 💫 Vega: model `default-llm-sg/gemini-3.1-pro-preview`
      Each gets the review standard + PR details. Do NOT pre-feed the diff.
      Let each reviewer pull via `gh pr view` and `gh pr diff` themselves.
      Each reviewer must `export https_proxy=http://127.0.0.1:1083` first.
      Reviewers must NOT post to GitHub — text output only.
      Use sessions_yield to wait for all 3 to complete.
    next: post_summary

  post_summary:
    task: |
      Consolidate the 3 reviews into a structured summary:
      - Consensus findings (2+ reviewers agree) — high confidence
      - Per-reviewer unique findings
      - Per-reviewer rating and key points
      - Overall verdict
      Post to channel.
    next: post_comment

  post_comment:
    task: |
      If mode is "comment":
        1. Parse each reviewer's findings in `[FILE:LINE] severity: description` format
        2. Build review payload with summary body + inline comments
        3. Tag findings with reviewer(s): [Stella], [Nova+Vega], etc.
        4. Post as COMMENT review (not APPROVE/REQUEST_CHANGES) via:
           gh api repos/{owner}/{repo}/pulls/{pr}/reviews
        5. Report to channel that review was posted
      If mode is "report":
        Skip — summary already posted to channel.
    next: reflection

  reflection:
    task: |
      Post-review self-improvement. DO NOT SKIP.

      Layer 1 — Record: Write to `runs/<repo>-<pr_number>.md`
      Layer 2 — Prompt Evolution: Read recent runs/, update prompts/ if blind spots found
      Layer 3 — Reviewer Assessment: Update `stats.md` per-reviewer accuracy
      Layer 4 — Process Evolution: Did the workflow work well? Update if needed.

      Commit and push any changes with `evolve: <what changed and why>`
      Push is mandatory — local-only commits are invisible to reviewers.
    next: register_tracking

  register_tracking:
    task: |
      Add entry to `tracking.json`:
      { "owner": "...", "repo": "...", "pr": N, "reviewed_at": "ISO date", "status": "open", "ground_truth": null }
      The tracking cron checks these PRs for human review feedback later.
    terminal: true
